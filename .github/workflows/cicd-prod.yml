name: Build and Deploy Flutter Web

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # ✅ Always uses the latest stable version

      - name: Build Flutter web
        run: flutter build web --release

      # ✅ NEW STEP: This wipes the old files so the browser doesn't load a cached version!
      - name: Clean old website files on VPS
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            sudo rm -rf /var/www/html/*

      - name: Deploy to VPS via SSH (username + password)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "build/web/*"
          target: "/var/www/html"
          strip_components: 2

      - name: Restart Nginx
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: sudo systemctl restart nginx
